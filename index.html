<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mission Hacker Login</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    :root {
      color-scheme: light;
      font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #eef1f6;
      color: #13131a;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
    }

    body {
      background: radial-gradient(circle at top, #fef6e9 0%, #eef1f6 40%, #e8eef6 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 24px;
    }

    .page-shell {
      width: 100%;
      max-width: 420px;
    }

    .login-card {
      background: #ffffff;
      border-radius: 32px;
      padding: 38px 28px 28px;
      box-shadow: 0 40px 75px rgba(17, 24, 39, 0.08);
      position: relative;
    }

    .back-link {
      position: absolute;
      top: 22px;
      left: 22px;
      width: 40px;
      height: 40px;
      border-radius: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: rgba(245, 246, 252, 0.95);
      border: 1px solid rgba(226, 232, 240, 0.9);
      color: #1f2937;
      text-decoration: none;
    }

    .icon-arrow {
      width: 22px;
      height: 22px;
      fill: currentColor;
    }

    .brand-ring {
      display: flex;
      justify-content: center;
      margin-top: -22px;
      margin-bottom: 20px;
    }

    .brand-circle {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: #ffffff;
      padding: 6px;
      display: grid;
      place-items: center;
      overflow: hidden;
      position: relative;
      border: 4px solid rgba(255, 255, 255, 0.9);
      box-shadow: 0 30px 60px rgba(17, 24, 39, 0.14);
    }

    .brand-circle::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: radial-gradient(circle at center, rgba(255, 255, 255, 0.8), transparent 55%);
      pointer-events: none;
    }

    .brand-logo {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      border-radius: 50%;
      background: transparent;
    }

    .login-copy {
      text-align: center;
      margin-bottom: 28px;
    }

    .login-copy h1 {
      margin: 0;
      font-size: 2rem;
      line-height: 1.1;
      color: #111827;
    }

    .login-copy p {
      margin: 12px auto 0;
      max-width: 82%;
      font-size: 0.97rem;
      color: #6b7280;
    }

    .login-form {
      display: grid;
      gap: 18px;
    }

    .input-label {
      display: grid;
      gap: 10px;
      font-size: 0.9rem;
      color: #374151;
    }

    .label-text {
      display: block;
    }

    .input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
      background: #f8fafc;
      border: 1px solid #e5e7eb;
      border-radius: 18px;
      padding: 12px 16px;
    }

    .input-wrapper input {
      width: 100%;
      border: none;
      background: transparent;
      font-size: 1rem;
      color: #111827;
      outline: none;
      padding-left: 38px;
    }

    .input-icon {
      position: absolute;
      left: 16px;
      width: 20px;
      height: 20px;
      display: grid;
      place-items: center;
      color: #f16b00;
    }

    .input-icon svg {
      width: 20px;
      height: 20px;
      fill: currentColor;
    }

    .password-toggle {
      border: none;
      background: transparent;
      color: #6b7280;
      cursor: pointer;
      padding: 0;
      margin-left: auto;
      width: 28px;
      height: 28px;
      display: grid;
      place-items: center;
    }

    .password-toggle svg {
      width: 20px;
      height: 20px;
      fill: currentColor;
    }

    .form-footer {
      text-align: right;
    }

    .forgot-link {
      font-size: 0.92rem;
      color: #ef7c01;
      text-decoration: none;
    }

    .btn {
      width: 100%;
      border: none;
      border-radius: 18px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 14px 18px;
    }

    .btn-primary {
      background: linear-gradient(90deg, #ff7b00 0%, #ff9300 100%);
      color: #ffffff;
      box-shadow: 0 20px 35px rgba(255, 123, 0, 0.25);
    }

    .divider {
      display: flex;
      align-items: center;
      text-align: center;
      gap: 16px;
      margin: 22px 0;
      color: #9ca3af;
      font-size: 0.92rem;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #e5e7eb;
    }

    .btn-secondary {
      background: #ffffff;
      border: 1px solid #d1d5db;
      color: #111827;
      gap: 12px;
    }

    .google-logo {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
    }

    .google-logo svg {
      width: 20px;
      height: 20px;
    }

    .signup-line {
      margin-top: 20px;
      display: flex;
      justify-content: center;
      gap: 8px;
      font-size: 0.95rem;
      color: #6b7280;
    }

    .signup-line a {
      color: #f16b00;
      text-decoration: none;
      font-weight: 600;
    }

    @media (max-width: 460px) {
      .login-card {
        padding: 28px 18px 24px;
      }

      .brand-circle {
        width: 90px;
        height: 90px;
      }

      .login-copy h1 {
        font-size: 1.75rem;
      }
    }
  </style>
</head>
<body>
  <main class="page-shell">
    <section class="login-card">
      <a href="#" class="back-link" aria-label="Go back">
        <svg viewBox="0 0 24 24" class="icon icon-arrow"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
      </a>

      <div class="brand-ring">
        <div class="brand-circle">
          <img src="logo.png" alt="Mission Hackers Bangladesh logo" class="brand-logo" />
        </div>
      </div>

      <div class="login-copy">
        <h1>Welcome Back</h1>
        <p>Please sign in to continue learning.</p>
      </div>

      <form class="login-form" action="#" method="post">
        <label class="input-label">
          <span class="label-text">Email Address</span>
          <div class="input-wrapper">
            <span class="input-icon input-icon-email">
              <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
            </span>
            <input type="email" name="email" placeholder="Email Address" required />
          </div>
        </label>

        <label class="input-label">
          <span class="label-text">Password</span>
          <div class="input-wrapper">
            <span class="input-icon input-icon-password">
              <svg viewBox="0 0 24 24"><path d="M12 17a2 2 0 1 0 0-4 2 2 0 0 0 0 4zm6-7h-1V7a5 5 0 0 0-10 0v3H6c-1.1 0-2 .9-2 2v8c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2v-8c0-1.1-.9-2-2-2zm-8-3a3 3 0 0 1 6 0v3H10V7zm8 13H6v-8h12v8z"/></svg>
            </span>
            <input type="password" name="password" placeholder="Password" required />
            <button type="button" class="password-toggle" aria-label="Toggle password visibility">
              <svg viewBox="0 0 24 24"><path d="M12 6a9.77 9.77 0 0 1 8.46 5 9.77 9.77 0 0 1-16.92 0A9.77 9.77 0 0 1 12 6m0-2C7.03 4 2.73 7.11 1 12c1.73 4.89 6.03 8 11 8s9.27-3.11 11-8c-1.73-4.89-6.03-8-11-8zm0 5a3 3 0 1 1 0 6 3 3 0 0 1 0-6z"/></svg>
            </button>
          </div>
        </label>

        <div class="form-footer">
          <a href="#" class="forgot-link">Forgot Password?</a>
        </div>

        <button class="btn btn-primary" type="submit">Sign In</button>
      </form>

      <div class="divider">
        <span>OR</span>
      </div>

      <button class="btn btn-secondary" type="button">
        <span class="google-logo" aria-hidden="true">
          <svg viewBox="0 0 533.5 544.3"><path fill="#4285f4" d="M533.5 278.4c0-17.7-1.6-35-4.7-51.7H272v98h146.9c-6.3 34-25.5 62.9-54.5 82.1v68.2h88.2c51.6-47.5 81.9-117.5 81.9-196.6z"/><path fill="#34a853" d="M272 544.3c73.6 0 135.4-24.4 180.6-66.4l-88.2-68.2c-24.6 16.5-56 26.2-92.4 26.2-71 0-131.4-47.8-153-112.3H31.7v70.5c45.2 89.2 138.5 150.2 240.3 150.2z"/><path fill="#fbbc04" d="M119 324.5c-10.8-31.8-10.8-65.9 0-97.7V156.3H31.7c-38.8 76.7-38.8 167.6 0 244.3L119 324.5z"/><path fill="#ea4335" d="M272 107.7c39.8 0 75.7 13.7 103.9 40.6l78-78C411 24.8 345.4 0 272 0 170.2 0 77 60.9 31.7 150.1l87.3 70.1C140.6 155.5 201 107.7 272 107.7z"/></svg>
        </span>
        <span>Sign in with Google</span>
      </button>

      <div class="signup-line">
        <span>Don't have an account?</span>
        <a href="#">Sign Up</a>
      </div>
    </section>
  </main>
</body>
</html>
